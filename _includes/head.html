<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <script>
    (function () {
      var storageKey = "jungle-theme";
      var root = document.documentElement;
      var storedTheme = "system";

      try {
        var saved = localStorage.getItem(storageKey);
        if (saved === "light" || saved === "dark") {
          storedTheme = saved;
        }
      } catch (e) {
        storedTheme = "system";
      }

      if (storedTheme === "light" || storedTheme === "dark") {
        root.setAttribute("data-theme", storedTheme);
      } else {
        root.removeAttribute("data-theme");
      }
    })();
  </script>
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
  {%- feed_meta -%}
  <script>
    window.JUNGLE_PAGE_META = {
      owner: "{{ site.github.owner_name | default: 'jskim-research' }}",
      repo: "{{ site.github.repository_name | default: 'jungle-engine-study' }}",
      baseurl: "{{ site.baseurl | default: '' }}",
      pagePath: {{ page.path | jsonify }},
      pageUrl: {{ page.url | jsonify }},
      pageMetaEnabled: {% if page.page_meta == false %}false{% else %}true{% endif %}
    };
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"]],
        displayMath: [["\\[", "\\]"]]
      },
      options: {
        skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="{{ '/assets/js/page-meta.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/comments.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/recommend.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/write-page.js' | relative_url }}" defer></script>
</head>
